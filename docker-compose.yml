version: '3.8'

services:
  # MySQL Database
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=edgecache_db
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Origin Database/Asset Server
  origin-server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: origin-server
    # Run the origin server script
    command: node src/origin.js
    ports:
      - "9000:9000"
    environment:
      - ORIGIN_PORT=9000
      - MYSQL_HOST=mysql-db
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=rootpassword
      - MYSQL_DATABASE=edgecache_db
    depends_on:
      mysql-db:
        condition: service_healthy
    restart: unless-stopped

  # Edge Cache CDN Server
  edge-cache-server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edge-cache-server
    # Run the main CDN caching server
    command: node src/server.js
    ports:
      - "5001:5000"
    environment:
      - PORT=5000
      - ORIGIN_PORT=9000
      - ORIGIN_URL=http://origin-server:9000 
    volumes:
      - ./backend/cache:/usr/src/app/cache
    depends_on:
      - origin-server
    restart: unless-stopped

  # Frontend React Vite Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cdn-frontend
    ports:
      - "5173:5173"
    environment:
      - BACKEND_URL=http://edge-cache-server:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - edge-cache-server
    restart: unless-stopped

volumes:
  mysql-data:
